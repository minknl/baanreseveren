name: Padel Auto-Reservering

on:
  schedule:
    # Draait dagelijks om 07:00 UTC (= 08:00 of 09:00 NL tijd afhankelijk van zomer/wintertijd)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Handmatig starten via GitHub UI

jobs:
  reserve:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        run: npx puppeteer browsers install chrome

      - name: Run reservation script
        env:
          BR_USERNAME: ${{ secrets.BR_USERNAME }}
          BR_PASSWORD: ${{ secrets.BR_PASSWORD }}
          BR_BASE_URL: https://oudenrijn.baanreserveren.nl
        run: node src/reserve.js
